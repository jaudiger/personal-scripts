name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Detect changed paths
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            workflows:
              - '.github/workflows/**'

  lint-shell:
    uses: jaudiger/reusable-workflows/.github/workflows/static-analysis-shell.yml@4aef3115afe05a19785b3e14970ecd4f400cc457

  lint-actions:
    needs: changes
    if: needs.changes.outputs.workflows == 'true'
    uses: jaudiger/reusable-workflows/.github/workflows/static-analysis-github-actions.yml@4aef3115afe05a19785b3e14970ecd4f400cc457

  ci:
    if: always()
    needs: [lint-shell, lint-actions]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required checks passed
        env:
          RESULTS: ${{ toJson(needs.*.result) }}
        run: |
          echo "Job results: $RESULTS"
          if echo "$RESULTS" | grep -qE '"(failure|cancelled)"'; then
            echo "One or more required checks failed"
            exit 1
          fi
