name: Continuous Integration - Static Analysis (Shell)

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: static-analysis-shell-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  shell-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Brioche
        uses: brioche-dev/setup-brioche@v1.5.0

      - name: Install shellcheck
        run: brioche install -r shellcheck

      - name: Check linting
        run: find . -type f -exec awk 'FNR==1 && $0=="#!/usr/bin/env bash"{printf "%s\0",FILENAME}' {} + | xargs -r0 shellcheck -o all
